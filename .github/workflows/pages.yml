# BitOS Cloud v3 — Auto-deploy to GitHub Pages
# Triggers on push to main and claude/* branches, or manual dispatch

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          # Copy only the static assets needed for GitHub Pages
          cp index.html _site/
          cp app.js _site/
          cp manifest.json _site/
          cp sw.js _site/
          # Include the standalone bundle if present
          [ -f bitos-standalone.html ] && cp bitos-standalone.html _site/ || true
          # Include OPEN.md for reference
          [ -f OPEN.md ] && cp OPEN.md _site/ || true
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
